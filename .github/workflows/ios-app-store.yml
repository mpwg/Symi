name: App Store Release

on:
  push:
    tags:
      - 'v*'

jobs:
  submit-to-app-store:
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TELEMETRY_APP_ID: ${{ secrets.TELEMETRY_APP_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BRANCH: ${{ secrets.MATCH_GIT_BRANCH }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release-Secrets validieren
        run: |
          missing=()
          required=(
            APPLE_DEVELOPER_TEAM_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            SENTRY_DSN
            MATCH_GIT_URL
            MATCH_PASSWORD
            MATCH_GIT_BASIC_AUTHORIZATION
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Fehlende GitHub-Secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
        shell: bash

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Ruby und Bundler einrichten
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Release mit fastlane in den App Store submitten
        run: bundle exec fastlane ios release_app_store
