name: App Store Release

on:
  push:
    tags:
      - 'v*'

jobs:
  submit-to-app-store:
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TELEMETRY_APP_ID: ${{ secrets.TELEMETRY_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Ruby und Bundler einrichten
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Release-Archiv bauen und hochladen
        id: release
        run: ci_scripts/github_archive_upload.sh app-store

      - name: Version in App Store Connect submitten
        run: |
          bundle exec fastlane ios submit_app_store_review \
            api_key_path:"${{ steps.release.outputs.app_store_connect_api_key_json_path }}" \
            app_identifier:"${{ steps.release.outputs.bundle_id }}" \
            app_version:"${{ steps.release.outputs.marketing_version }}" \
            ipa:"${{ steps.release.outputs.ipa_path }}"
