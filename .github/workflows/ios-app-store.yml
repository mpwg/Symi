name: App Store Release

on:
  push:
    tags:
      - 'v*'

jobs:
  detect-release-changes:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Relevante Release-Änderungen prüfen
        id: filter
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          else
            changed_files="$(git ls-tree --name-only -r HEAD)"
          fi

          printf 'Geänderte Dateien:\n%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(MigraineTracker/|MigraineTrackerUITests/|MigraineTracker\.xcodeproj/|fastlane/|Gemfile$|Gemfile\.lock$|\.ruby-version$|\.github/workflows/ios-app-store\.yml$)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Keine relevanten Änderungen für ein App-Store-Deployment gefunden."
          fi
        shell: bash

  upload-app-store-release:
    needs: detect-release-changes
    if: needs.detect-release-changes.outputs.should_deploy == 'true'
    runs-on: macos-26
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TELEMETRY_APP_ID: ${{ secrets.TELEMETRY_APP_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BRANCH: ${{ secrets.MATCH_GIT_BRANCH }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      SCREENSHOT_IOS_VERSION: '26.4'
      SNAPSHOT_SIMULATOR_WAIT_FOR_BOOT_TIMEOUT: '10'
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Release-Secrets validieren
        run: |
          missing=()
          required=(
            APPLE_DEVELOPER_TEAM_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            SENTRY_DSN
            MATCH_GIT_URL
            MATCH_PASSWORD
            MATCH_GIT_BASIC_AUTHORIZATION
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Fehlende GitHub-Secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
        shell: bash

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Ruby und Bundler einrichten
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: App-Store-Release mit fastlane vorbereiten
        run: bundle exec fastlane ios release_app_store
