name: iOS CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "MigraineTracker/**"
      - "MigraineTrackerTests/**"
      - "MigraineTracker.xcodeproj/**"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
    paths:
      - "MigraineTracker/**"
      - "MigraineTrackerTests/**"
      - "MigraineTracker.xcodeproj/**"
      - ".github/workflows/ios-ci.yml"

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TELEMETRY_APP_ID: ${{ secrets.TELEMETRY_APP_ID }}
      RESULT_BUNDLE_PATH: ${{ github.workspace }}/artifacts/MigraineTrackerTests.xcresult
      TEST_DESTINATION: platform=macOS,arch=arm64,variant=Mac Catalyst
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Secrets prüfen
        run: |
          if [ -z "${APPLE_DEVELOPER_TEAM_ID}" ]; then
            echo "Das GitHub Secret APPLE_DEVELOPER_TEAM_ID fehlt."
            exit 1
          fi

      - name: Lokale CI-Konfiguration erzeugen
        run: |
          mkdir -p artifacts
          cat > MigraineTracker/Configs/LocalSecrets.xcconfig <<EOF
          APPLE_DEVELOPER_TEAM_ID = ${APPLE_DEVELOPER_TEAM_ID}
          SENTRY_DSN = ${SENTRY_DSN}
          TELEMETRY_APP_ID = ${TELEMETRY_APP_ID}
          EOF

      - name: Swift Packages auflösen
        run: xcodebuild -resolvePackageDependencies -project MigraineTracker.xcodeproj
          -scheme MigraineTrackerTests

      - name: Tests vorbereiten
        run: |
          xcodebuild build-for-testing \
            -project MigraineTracker.xcodeproj \
            -scheme MigraineTrackerTests \
            -destination "${TEST_DESTINATION}" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO

      - name: Tests ausführen
        run: |
          xcodebuild test-without-building \
            -project MigraineTracker.xcodeproj \
            -scheme MigraineTrackerTests \
            -destination "${TEST_DESTINATION}" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData" \
            -resultBundlePath "${RESULT_BUNDLE_PATH}" \
            CODE_SIGNING_ALLOWED=NO

      - name: xcresult hochladen
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-ci-xcresult
          path: ${{ env.RESULT_BUNDLE_PATH }}
          if-no-files-found: warn
