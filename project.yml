name: MigraineTracker
options:
  bundleIdPrefix: com.mpwg
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_LANGUAGE: de
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Migraine Tracker
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    CODE_SIGN_STYLE: Automatic
targets:
  MigraineTrackerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MigraineTrackerApp/Sources
    resources:
      - path: MigraineTrackerApp/Resources
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mpwg.MigraineTracker
        PRODUCT_NAME: MigraineTracker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Migraine Tracker nutzt deinen Standort nur, um beim Erfassen einer Episode passende Wetterdaten zu ergänzen.
    scheme:
      gatherCoverageData: false
      testTargets: []
